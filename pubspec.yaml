name: phanconghieu020100
description: "A new Flutter project."
publish_to: 'none'

version: 1.1.2+459

environment:
  sdk: ">=2.16.2 <3.0.0"

flutter_icons:
  android: true
  ios: false
  image_path: "assets/images/logo_android.png"
  
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  get: ^4.6.6
  shared_preferences: ^2.3.1
  google_fonts: ^6.2.1
  flutter_screenutil: ^5.9.3
  auto_size_text: ^3.0.0
  equatable: ^2.0.5
  flutter_typeahead: ^4.6.2
  flutter_flavor: ^3.1.1
  

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^1.0.0
  rename: ^2.0.1
  flutter_launcher_icons: ^0.11.0 # flutter pub run flutter_launcher_icons

